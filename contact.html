<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Faris Kabaklić</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">FK</a>
        <div class="nav-right">
            <button class="dark-toggle" onclick="toggleDarkMode()">Dark Mode</button>
            <div class="menu" onclick="toggleMenu()">MENU</div>
        </div>
    </nav>

    <div id="main-content">
        <div class="headline">
            <p>LET'S TALK</p>
            <h1>CONTACT</h1>
        </div>

        <div class="contact-content">
            <div class="contact-info">
                <div class="contact-item">
                    <h2>Email</h2>
                    <a href="mailto:your.email@example.com">your.email@example.com</a>
                </div>

                <div class="contact-item">
                    <h2>LinkedIn</h2>
                    <a href="https://www.linkedin.com/in/hirefaris" target="_blank" rel="noopener noreferrer">linkedin.com/in/hirefaris</a>
                </div>

                <div class="contact-item">
                    <h2>Location</h2>
                    <p>Based in Chicago, IL.</p>
                </div>
            </div>

            <form class="contact-form">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" name="subject" required>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="6" required></textarea>
                </div>

                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </div>

        <footer>
            <p>&copy; Designed by Faris</p>
            <a href="https://www.linkedin.com/in/hirefaris" target="_blank" rel="noopener noreferrer">
                <img src="https://cdn-icons-png.flaticon.com/512/174/174857.png" alt="LinkedIn" style="width: 24px; height: 24px;">
            </a>
        </footer>
    </div>

    <div class="menu-overlay" id="menuOverlay">
        <div class="close-btn" onclick="toggleMenu()">&times;</div>
        <a href="index.html">Work</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </div>

    <script>
    function toggleMenu() {
        const overlay = document.getElementById('menuOverlay');
        const main = document.getElementById('main-content');
        overlay.classList.toggle('active');
        main.style.display = main.style.display === 'none' ? 'block' : 'none';
    }

    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
    }
    </script>
</body>
</html>
